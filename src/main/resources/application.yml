server:
  port: 8080

spring:
  application:
    name: eduplus

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eduplus_db}
    username: ${DB_USER:eduplus_user}
    password: ${DB_PASSWORD:eduplus_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:changeThisSecretKeyForEduPlusProjectL3IPD2026MakeItLongEnough}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
